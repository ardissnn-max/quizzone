<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizZone — Kuis Pengetahuan Umum</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a12;
      --card: #13131f;
      --border: #1e1e30;
      --accent: #7c5cfc;
      --accent2: #fc5c7d;
      --green: #2ecc71;
      --red: #e74c3c;
      --text: #e8e8f0;
      --muted: #6b6b88;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,92,252,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(252,92,125,0.12) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
    }

    /* ===== SCREEN: START ===== */
    #start-screen {
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .tagline {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 40px;
    }

    .info-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 36px;
    }

    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 12px;
    }

    .info-card .num {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent);
    }

    .info-card .label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .btn-start {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 30px rgba(124,92,252,0.3);
    }

    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(124,92,252,0.45); }
    .btn-start:active { transform: translateY(0); }

    /* ===== SCREEN: QUIZ ===== */
    #quiz-screen { display: none; animation: fadeUp 0.5s ease both; }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .q-counter {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .q-counter span { color: var(--text); font-weight: 700; }

    .score-badge {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .score-badge .pts { color: var(--accent); font-family: 'Syne', sans-serif; }

    /* Progress bar */
    .progress-track {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    /* Timer */
    .timer-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .timer-ring {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .timer-ring circle {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
    }

    .timer-ring .track { stroke: var(--border); }
    .timer-ring .fill { stroke: var(--accent); stroke-dasharray: 113; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; transform-origin: center; transform: rotate(-90deg); }

    .timer-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 28px;
    }

    .timer-label { color: var(--muted); font-size: 0.82rem; }

    /* Question card */
    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 16px;
    }

    .q-category {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      background: rgba(124,92,252,0.12);
      border-radius: 6px;
      padding: 4px 10px;
      margin-bottom: 14px;
    }

    .q-text {
      font-size: 1.15rem;
      font-weight: 500;
      line-height: 1.6;
    }

    /* Options */
    .options { display: grid; gap: 10px; }

    .opt-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }

    .opt-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(124,92,252,0.08);
      transform: translateX(4px);
    }

    .opt-letter {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      background: var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      transition: background 0.2s;
    }

    .opt-btn.correct { border-color: var(--green); background: rgba(46,204,113,0.1); }
    .opt-btn.correct .opt-letter { background: var(--green); color: #fff; }
    .opt-btn.wrong { border-color: var(--red); background: rgba(231,76,60,0.1); }
    .opt-btn.wrong .opt-letter { background: var(--red); color: #fff; }
    .opt-btn:disabled { cursor: not-allowed; opacity: 0.7; }

    .feedback-bar {
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .feedback-bar.show { opacity: 1; }
    .feedback-bar.correct-fb { background: rgba(46,204,113,0.15); color: var(--green); }
    .feedback-bar.wrong-fb { background: rgba(231,76,60,0.12); color: var(--red); }

    /* ===== SCREEN: RESULT ===== */
    #result-screen {
      display: none;
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px;
      margin-bottom: 20px;
    }

    .result-emoji { font-size: 3.5rem; margin-bottom: 12px; }

    .result-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .result-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 28px; }

    .big-score {
      font-family: 'Syne', sans-serif;
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 6px;
    }

    .score-max { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }

    .stat-box {
      background: var(--bg);
      border-radius: 14px;
      padding: 16px 8px;
    }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .stat-val.g { color: var(--green); }
    .stat-val.r { color: var(--red); }
    .stat-val.a { color: var(--accent); }
    .stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .btn-retry {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 30px rgba(124,92,252,0.3);
    }

    .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(124,92,252,0.45); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- START SCREEN -->
  <div id="start-screen">
    <div class="logo">QuizZone ⚡</div>
    <p class="tagline">Uji pengetahuanmu dalam 60 detik!</p>

    <div class="info-cards">
      <div class="info-card">
        <div class="num">10</div>
        <div class="label">Pertanyaan</div>
      </div>
      <div class="info-card">
        <div class="num">15s</div>
        <div class="label">Per Soal</div>
      </div>
      <div class="info-card">
        <div class="num">100</div>
        <div class="label">Poin Maks</div>
      </div>
    </div>

    <button class="btn-start" onclick="startQuiz()">Mulai Kuis →</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen">
    <div class="quiz-header">
      <div class="q-counter">Soal <span id="q-num">1</span> / 10</div>
      <div class="score-badge">Skor: <span class="pts" id="score-disp">0</span></div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:10%"></div>
    </div>

    <div class="timer-wrap">
      <svg class="timer-ring" viewBox="0 0 40 40">
        <circle class="track" cx="20" cy="20" r="18"/>
        <circle class="fill" id="timer-ring" cx="20" cy="20" r="18"/>
      </svg>
      <div>
        <div class="timer-num" id="timer-num">15</div>
        <div class="timer-label">detik tersisa</div>
      </div>
    </div>

    <div class="q-card">
      <div class="q-category" id="q-category">Kategori</div>
      <div class="q-text" id="q-text">Pertanyaan muncul di sini...</div>
    </div>

    <div class="options" id="options"></div>
    <div class="feedback-bar" id="feedback-bar"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji">🏆</div>
      <div class="result-title" id="result-title">Luar Biasa!</div>
      <div class="result-sub" id="result-sub">Kamu juara kuis hari ini</div>
      <div class="big-score" id="final-score">0</div>
      <div class="score-max">dari 100 poin</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-val g" id="stat-correct">0</div>
          <div class="stat-lbl">✅ Benar</div>
        </div>
        <div class="stat-box">
          <div class="stat-val r" id="stat-wrong">0</div>
          <div class="stat-lbl">❌ Salah</div>
        </div>
        <div class="stat-box">
          <div class="stat-val a" id="stat-acc">0%</div>
          <div class="stat-lbl">🎯 Akurasi</div>
        </div>
      </div>
    </div>
    <button class="btn-retry" onclick="restartQuiz()">🔁 Main Lagi</button>
  </div>

</div>

<script>
const questions = [
  {
    category: "Teknologi",
    question: "Apa kepanjangan dari 'HTML'?",
    options: ["HyperText Markup Language","HighText Machine Language","Hyperlink and Text Markup Language","HyperTool Markup Language"],
    answer: 0
  },
  {
    category: "Sains",
    question: "Planet manakah yang dikenal sebagai Planet Merah?",
    options: ["Venus","Jupiter","Mars","Saturn"],
    answer: 2
  },
  {
    category: "Geografi",
    question: "Apa ibu kota dari Australia?",
    options: ["Sydney","Melbourne","Brisbane","Canberra"],
    answer: 3
  },
  {
    category: "Teknologi",
    question: "Bahasa pemrograman apa yang dikenal dengan logo ular piton?",
    options: ["Java","Ruby","Python","Cobra"],
    answer: 2
  },
  {
    category: "Matematika",
    question: "Berapakah hasil dari 15 × 15?",
    options: ["200","215","225","230"],
    answer: 2
  },
  {
    category: "Sejarah",
    question: "Pada tahun berapa Indonesia merdeka?",
    options: ["1942","1943","1944","1945"],
    answer: 3
  },
  {
    category: "Teknologi",
    question: "Siapakah pendiri perusahaan Apple Inc.?",
    options: ["Bill Gates","Elon Musk","Steve Jobs","Mark Zuckerberg"],
    answer: 2
  },
  {
    category: "Sains",
    question: "Apa rumus kimia untuk air?",
    options: ["CO2","H2O","O2","NaCl"],
    answer: 1
  },
  {
    category: "Geografi",
    question: "Sungai terpanjang di dunia adalah?",
    options: ["Amazon","Yangtze","Mississippi","Nil"],
    answer: 3
  },
  {
    category: "Teknologi",
    question: "CSS adalah singkatan dari?",
    options: ["Cascading Style Sheets","Computer Style Sheets","Colorful Style System","Creative Style Sheets"],
    answer: 0
  }
];

const letters = ['A','B','C','D'];
let current = 0, score = 0, correct = 0, wrong = 0;
let timer, timeLeft;
const TIMER_MAX = 15;

function startQuiz() {
  current = 0; score = 0; correct = 0; wrong = 0;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  const qs = document.getElementById('quiz-screen');
  qs.style.display = 'block';
  qs.style.animation = 'none';
  setTimeout(() => qs.style.animation = 'fadeUp 0.5s ease both', 10);
  loadQuestion();
}

function loadQuestion() {
  const q = questions[current];
  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('score-disp').textContent = score;
  document.getElementById('progress-fill').style.width = ((current + 1) / 10 * 100) + '%';
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.question;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    opts.appendChild(btn);
  });

  const fb = document.getElementById('feedback-bar');
  fb.className = 'feedback-bar';
  fb.textContent = '';

  startTimer();
}

function startTimer() {
  timeLeft = TIMER_MAX;
  updateTimerDisplay();
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timer);
      timeUp();
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timer-num').textContent = timeLeft;
  const ring = document.getElementById('timer-ring');
  const pct = timeLeft / TIMER_MAX;
  const circumference = 2 * Math.PI * 18;
  ring.style.strokeDashoffset = circumference * (1 - pct);
  ring.style.stroke = pct > 0.5 ? '#7c5cfc' : pct > 0.25 ? '#fc5c7d' : '#e74c3c';
}

function timeUp() {
  disableOptions();
  showFeedback(false, '⏰ Waktu habis! Soal berikutnya...');
  wrong++;
  setTimeout(nextQuestion, 1800);
}

function selectAnswer(idx, btn) {
  clearInterval(timer);
  const q = questions[current];
  disableOptions();

  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns[q.answer].classList.add('correct');

  if (idx === q.answer) {
    const pts = Math.round((timeLeft / TIMER_MAX) * 10);
    score += pts;
    correct++;
    document.getElementById('score-disp').textContent = score;
    showFeedback(true, `✅ Benar! +${pts} poin`);
  } else {
    btn.classList.add('wrong');
    btn.classList.add('shake');
    wrong++;
    showFeedback(false, '❌ Salah! Lihat jawaban yang benar ya');
  }

  setTimeout(nextQuestion, 1800);
}

function disableOptions() {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
}

function showFeedback(isCorrect, msg) {
  const fb = document.getElementById('feedback-bar');
  fb.textContent = msg;
  fb.className = 'feedback-bar show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResult();
  } else {
    loadQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'block';

  const pct = (score / 100) * 100;
  let emoji, title, sub;
  if (pct >= 80) { emoji = '🏆'; title = 'Luar Biasa!'; sub = 'Kamu jenius kuis sejati!'; }
  else if (pct >= 60) { emoji = '🎉'; title = 'Bagus Sekali!'; sub = 'Hampir sempurna, terus belajar!'; }
  else if (pct >= 40) { emoji = '👍'; title = 'Lumayan!'; sub = 'Masih bisa lebih baik, coba lagi!'; }
  else { emoji = '📚'; title = 'Jangan Menyerah!'; sub = 'Banyak-banyak baca ya, pasti bisa!'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('final-score').textContent = score;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-acc').textContent = Math.round((correct / 10) * 100) + '%';
}

function restartQuiz() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'block';
}
</script>
</body>
</html>
